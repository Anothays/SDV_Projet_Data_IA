<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Veille CVE — CERT-FR / ANSSI{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
  <style>
    body { background:#f5f6f8; }
    .kpi-card .display-6 { font-weight:700; }
    .chart-card { background:#fff; border-radius:.5rem; box-shadow:0 1px 3px rgba(0,0,0,.08); }
    .table-sm td, .table-sm th { vertical-align:middle; }
    .truncate { max-width:340px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    pre.email-preview { background:#1e1e1e; color:#e6e6e6; padding:1rem; border-radius:.4rem; white-space:pre-wrap; font-size:.85rem; }
    /* Termes du glossaire : soulignés en pointillés, cliquables pour la définition. */
    .glossary-term { text-decoration:underline dotted; text-underline-offset:2px;
      cursor:help; font-weight:600; border:0; }
    .glossary-term:focus { outline:2px solid #0d6efd; outline-offset:2px; border-radius:2px; }
    .chart-lede { line-height:1.35; }
    .chart-takeaway .badge { font-weight:600; }
    .intro-lead { max-width:70ch; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">🛡️ Veille CVE / CERT-FR</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav"
              aria-controls="nav" aria-expanded="false" aria-label="Ouvrir la navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        {% with active=request.resolver_match.url_name %}
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link {% if active == 'dashboard' %}active{% endif %}" href="{% url 'dashboard' %}">Tableau de bord</a></li>
          <li class="nav-item"><a class="nav-link {% if active == 'cve_list' or active == 'cve_detail' %}active{% endif %}" href="{% url 'cve_list' %}">CVE</a></li>
          <li class="nav-item"><a class="nav-link {% if active == 'bulletin_list' or active == 'bulletin_detail' %}active{% endif %}" href="{% url 'bulletin_list' %}">Bulletins</a></li>
          <li class="nav-item"><a class="nav-link {% if active == 'alerts' %}active{% endif %}" href="{% url 'alerts' %}">Alertes</a></li>
        </ul>
        {% endwith %}
        <a class="btn btn-outline-light btn-sm" href="/admin/">Admin</a>
      </div>
    </div>
  </nav>

  <main class="container-fluid px-4 pb-5">
    {% block content %}{% endblock %}
  </main>

  <footer class="text-center text-muted small py-4">
    Projet Data &amp; IA — SUP DE VINCI · Données CERT-FR / ANSSI enrichies MITRE &amp; EPSS
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Active les infobulles du glossaire (sigles expliqués en langage courant).
    document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(function (el) {
      new bootstrap.Tooltip(el);
    });
  </script>
</body>
</html>
