{% if page_obj.paginator.num_pages > 1 %}
<nav class="mt-3">
  <ul class="pagination pagination-sm justify-content-center flex-wrap">
    {% if page_obj.has_previous %}
      <li class="page-item"><a class="page-link" href="?{% if base_query %}{{ base_query }}&amp;{% endif %}page=1">&laquo;</a></li>
      <li class="page-item"><a class="page-link" href="?{% if base_query %}{{ base_query }}&amp;{% endif %}page={{ page_obj.previous_page_number }}">&lsaquo;</a></li>
    {% endif %}
    <li class="page-item disabled"><span class="page-link">Page {{ page_obj.number }} / {{ page_obj.paginator.num_pages }}</span></li>
    {% if page_obj.has_next %}
      <li class="page-item"><a class="page-link" href="?{% if base_query %}{{ base_query }}&amp;{% endif %}page={{ page_obj.next_page_number }}">&rsaquo;</a></li>
      <li class="page-item"><a class="page-link" href="?{% if base_query %}{{ base_query }}&amp;{% endif %}page={{ page_obj.paginator.num_pages }}">&raquo;</a></li>
    {% endif %}
  </ul>
</nav>
{% endif %}
